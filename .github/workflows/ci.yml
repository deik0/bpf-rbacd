name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (workspace)
        run: cargo clippy --all-targets --all-features -- -D warnings

  lint-ebpf:
    name: Lint eBPF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bpf-rbacd-ebpf

      - name: Check formatting
        working-directory: bpf-rbacd-ebpf
        run: cargo fmt -- --check

  build:
    name: Build (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Build release
        run: cargo build --release

  build-ebpf:
    name: Build eBPF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - name: Add BPF target
        run: rustup target add bpfel-unknown-none

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bpf-rbacd-ebpf

      - name: Build eBPF programs
        working-directory: bpf-rbacd-ebpf
        run: cargo build --target bpfel-unknown-none -Z build-std=core --release

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests (non-privileged)
        run: cargo test --test integration -- --skip "ignored"

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build docs (workspace)
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Build docs (bpf-rbacd-common with user feature)
        run: cargo doc --no-deps -p bpf-rbacd-common --features user
        env:
          RUSTDOCFLAGS: "-D warnings"

  check:
    name: All CI passed
    if: always()
    needs:
      - lint
      - lint-ebpf
      - build
      - build-ebpf
      - test-unit
      - test-integration
      - doc
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
